<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Märchen-Glücksrad</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
      gap: 1.5rem;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #3a1a00;
      text-align: center;
    }

    .subtitle {
      font-size: 15px;
      color: #a06030;
      text-align: center;
      margin-top: -1rem;
    }

    .wheel-wrapper {
      position: relative;
      width: 340px;
      height: 340px;
    }

    #wheelCanvas {
      display: block;
      border-radius: 50%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }

    .pointer-line {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 3px;
      height: 100%;
      background: rgba(255,255,255,0.8);
      pointer-events: none;
      z-index: 10;
      border-radius: 2px;
    }

    .pointer-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      border: 3px solid #e87a2a;
      z-index: 20;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .spin-btn {
      background: #e87a2a;
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 20px;
      font-weight: 600;
      padding: 0.85rem 2.8rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
      box-shadow: 0 3px 12px rgba(232,122,42,0.4);
    }

    .spin-btn:hover { background: #d06a1a; }
    .spin-btn:active { transform: scale(0.97); }
    .spin-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 420px;
    }

    .result-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: white;
      border-radius: 12px;
      padding: 10px 6px;
      border: 1.5px solid #f0d0b0;
      transition: border-color 0.3s, background 0.3s;
    }

    .result-card.highlight {
      border-color: #e87a2a;
      background: #fff3e6;
    }

    .result-emoji { font-size: 24px; line-height: 1; }

    .result-label {
      font-size: 11px;
      color: #555;
      text-align: center;
      line-height: 1.3;
      font-weight: 500;
    }

    .result-category {
      font-size: 10px;
      color: #aaa;
      text-align: center;
    }

    .story-prompt {
      max-width: 420px;
      width: 100%;
      background: white;
      border-radius: 16px;
      border: 1.5px solid #f0c090;
      padding: 1.1rem 1.3rem;
      display: none;
      box-shadow: 0 2px 12px rgba(232,122,42,0.1);
    }

    .story-prompt.visible { display: block; }

    .story-label {
      font-size: 12px;
      color: #a05010;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .story-text {
      font-size: 15px;
      color: #3a1a00;
      line-height: 1.65;
    }

    footer {
      font-size: 12px;
      color: #ccc;
      text-align: center;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <h1>✨ Märchen-Glücksrad</h1>
  <p class="subtitle">Dreh die Räder und erfinde deine Geschichte!</p>

  <div class="wheel-wrapper">
    <canvas id="wheelCanvas" width="340" height="340"></canvas>
    <div class="pointer-line"></div>
    <div class="pointer-dot"></div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spinAll()">✨ Drehen!</button>

  <div class="result-grid" id="resultGrid">
    <div class="result-card" id="rc0"><div class="result-emoji">?</div><div class="result-label">—</div><div class="result-category">Figur</div></div>
    <div class="result-card" id="rc1"><div class="result-emoji">?</div><div class="result-label">—</div><div class="result-category">Ort</div></div>
    <div class="result-card" id="rc2"><div class="result-emoji">?</div><div class="result-label">—</div><div class="result-category">Gegenstand</div></div>
    <div class="result-card" id="rc3"><div class="result-emoji">?</div><div class="result-label">—</div><div class="result-category">Tier</div></div>
    <div class="result-card" id="rc4"><div class="result-emoji">?</div><div class="result-label">—</div><div class="result-category">Aufgabe</div></div>
  </div>

  <div class="story-prompt" id="storyPrompt">
    <div class="story-label">Eure Geschichte könnte so anfangen:</div>
    <div class="story-text" id="storyText"></div>
  </div>

  <footer>Märchen-Glücksrad · inspiriert von der Ausstellung Wortreich, Bad Hersfeld</footer>

<script>
const rings = [
  {
    name: "Figur",
    color: "#F4A843",
    items: [
      { emoji: "👸", label: "Prinzessin" },
      { emoji: "🧙", label: "Zauberer" },
      { emoji: "⚔️", label: "Ritter" },
      { emoji: "🧌", label: "Riese" },
      { emoji: "🧛", label: "Vampir" },
      { emoji: "🧝", label: "Elfe" },
      { emoji: "👑", label: "König" },
      { emoji: "🧟", label: "Monster" },
    ]
  },
  {
    name: "Ort",
    color: "#E87A2A",
    items: [
      { emoji: "🏰", label: "Schloss" },
      { emoji: "🌲", label: "Wald" },
      { emoji: "🏔️", label: "Berg" },
      { emoji: "🌊", label: "Meer" },
      { emoji: "🏚️", label: "Hütte" },
      { emoji: "🕌", label: "Turm" },
      { emoji: "🌋", label: "Höhle" },
      { emoji: "🌾", label: "Dorf" },
    ]
  },
  {
    name: "Gegenstand",
    color: "#F4A843",
    items: [
      { emoji: "🪄", label: "Zauberstab" },
      { emoji: "🗡️", label: "Schwert" },
      { emoji: "🍎", label: "Apfel" },
      { emoji: "🪞", label: "Spiegel" },
      { emoji: "💎", label: "Edelstein" },
      { emoji: "🧪", label: "Trank" },
      { emoji: "🔑", label: "Schlüssel" },
      { emoji: "📖", label: "Zauberbuch" },
    ]
  },
  {
    name: "Tier",
    color: "#E87A2A",
    items: [
      { emoji: "🐺", label: "Wolf" },
      { emoji: "🐸", label: "Frosch" },
      { emoji: "🦄", label: "Einhorn" },
      { emoji: "🐉", label: "Drache" },
      { emoji: "🦊", label: "Fuchs" },
      { emoji: "🦅", label: "Adler" },
      { emoji: "🐻", label: "Bär" },
      { emoji: "🦁", label: "Löwe" },
    ]
  },
  {
    name: "Aufgabe",
    color: "#F4A843",
    items: [
      { emoji: "🔓", label: "Befreiung" },
      { emoji: "🧩", label: "Rätsel" },
      { emoji: "✨", label: "Fluch" },
      { emoji: "🗺️", label: "Suche" },
      { emoji: "🔮", label: "Verwandlung" },
      { emoji: "💔", label: "Liebe" },
      { emoji: "🏆", label: "Wettkampf" },
      { emoji: "🌙", label: "Prophezeiung" },
    ]
  }
];

const radii = [160, 130, 100, 72, 46];
const cx = 170, cy = 170;
let angles = [0, 0, 0, 0, 0];
let spinning = false;

function drawWheel() {
  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 340, 340);

  for (let r = 0; r < 5; r++) {
    const outerR = radii[r];
    const innerR = r < 4 ? radii[r + 1] + 3 : 0;
    const items = rings[r].items;
    const n = items.length;
    const sliceAngle = (2 * Math.PI) / n;
    const offset = angles[r];

    for (let i = 0; i < n; i++) {
      const startA = offset + i * sliceAngle - Math.PI / 2;
      const endA = startA + sliceAngle;
      const midA = (startA + endA) / 2;

      ctx.beginPath();
      ctx.moveTo(cx + innerR * Math.cos(startA), cy + innerR * Math.sin(startA));
      ctx.arc(cx, cy, outerR, startA, endA);
      if (innerR > 0) {
        ctx.arc(cx, cy, innerR, endA, startA, true);
      } else {
        ctx.lineTo(cx, cy);
      }
      ctx.closePath();

      const isOdd = i % 2 === 0;
      ctx.fillStyle = isOdd ? rings[r].color : "#FFFFFF";
      ctx.fill();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.stroke();

      const emojiR = (outerR + innerR) / 2;
      const ex = cx + emojiR * Math.cos(midA);
      const ey = cy + emojiR * Math.sin(midA);

      const fontSize = Math.max(10, Math.round((outerR - innerR) * 0.5));
      ctx.font = fontSize + "px serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(items[i].emoji, ex, ey);
    }
  }

  ctx.beginPath();
  ctx.arc(cx, cy, 20, 0, 2 * Math.PI);
  ctx.fillStyle = "#e87a2a";
  ctx.fill();
}

function getSelected() {
  return rings.map((ring, r) => {
    const n = ring.items.length;
    const sliceAngle = (2 * Math.PI) / n;
    let a = (-(angles[r]) + Math.PI / 2 + sliceAngle / 2) % (2 * Math.PI);
    if (a < 0) a += 2 * Math.PI;
    const idx = Math.floor(a / sliceAngle) % n;
    return ring.items[idx];
  });
}

function updateCards(selected, highlight) {
  selected.forEach((item, i) => {
    const card = document.getElementById('rc' + i);
    card.querySelector('.result-emoji').textContent = item.emoji;
    card.querySelector('.result-label').textContent = item.label;
    if (highlight) {
      card.classList.add('highlight');
      setTimeout(() => card.classList.remove('highlight'), 1000);
    }
  });
}

function buildStory(sel) {
  const [figur, ort, gegenstand, tier, aufgabe] = sel.map(s => s.label);
  const stories = [
    `Es war einmal eine ${figur}, die in einem ${ort} lebte. Eines Tages fand sie einen magischen ${gegenstand} – und ein ${tier} zeigte den Weg zur großen ${aufgabe}...`,
    `Tief im ${ort} lebte ein ${tier}. Als eine tapfere ${figur} auftauchte und nach einem ${gegenstand} suchte, begann das Abenteuer der ${aufgabe}...`,
    `Eine ${figur} hatte nur eine Aufgabe: ${aufgabe}. Mit einem ${gegenstand} in der Hand und einem ${tier} als Begleiter machte sie sich auf den Weg zum ${ort}...`,
    `Im ${ort} war seit Jahren alles still – bis eine ${figur} ankam. Sie trug einen ${gegenstand} und sprach mit einem ${tier}. Gemeinsam wollten sie die ${aufgabe} vollenden...`,
  ];
  return stories[Math.floor(Math.random() * stories.length)];
}

function spinAll() {
  if (spinning) return;
  spinning = true;
  const btn = document.getElementById('spinBtn');
  btn.disabled = true;
  btn.textContent = "🌀 Dreht sich...";
  document.getElementById('storyPrompt').classList.remove('visible');

  const targets = rings.map(() => Math.random() * 6 * Math.PI + 4 * Math.PI);
  const starts = [...angles];
  const duration = 2800;
  const start = performance.now();

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function frame(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    const eased = easeOut(t);

    for (let r = 0; r < 5; r++) {
      angles[r] = starts[r] + targets[r] * eased;
    }
    drawWheel();

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      btn.disabled = false;
      btn.textContent = "✨ Nochmal drehen!";
      const selected = getSelected();
      updateCards(selected, true);
      const sp = document.getElementById('storyPrompt');
      document.getElementById('storyText').textContent = buildStory(selected);
      sp.classList.add('visible');
    }
  }

  requestAnimationFrame(frame);
}

drawWheel();
</script>
</body>
</html>
